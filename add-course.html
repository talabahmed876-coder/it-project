<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Course | Course Website</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <div>
        <h1>Add Course</h1>
        <p>FILL THE BLANKS</p>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="my-courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="container form-section">
      <h2>Format:</h2>
      <form>
        <label for="course-name"><b>Course name:</b></label>
        <input type="text" id="course-name" name="course-name" placeholder="Enter course name">

        <label for="instructor"><b>Teacher:</b></label>
        <input type="text" id="instructor" name="instructor" placeholder="Enter teachers name">

        <label for="credits"><b>Hours:</b></label>
        <input type="number" id="credits" name="credits" min="1" max="10" placeholder="Enter course hours">

        <label for="notes"><b></b>Notes:</b></label>
        <textarea id="notes" name="notes" rows="5" placeholder="Enter course notes"></textarea>

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>
</body>
</html>
